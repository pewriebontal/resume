name: Compile and Publish Resume

on:
  push:
    branches: [ master ]
    paths:
      - 'resume.md'
      - 'resume-template.tex'
      - '.github/workflows/workflow.yml'
      - 'compile'
  pull_request:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout resume repository
      uses: actions/checkout@v3
      
    - name: Install minimal TeX dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y texlive-xetex texlive-fonts-recommended texlive-fonts-extra pandoc
    
    - name: Compile resume
      run: ./compile
      
    - name: Get resume filename
      id: get-filename
      run: |
        NAME=$(grep '^name:' resume.md | sed 's/^name: "\(.*\)"$/\1/' | tr -d ' ')
        JOB_TITLE="SoftwareEngineer"
        RESUME_FILE="${NAME}.Resume.${JOB_TITLE}.pdf"
        echo "RESUME_FILE=${RESUME_FILE}" >> $GITHUB_ENV
        echo "Resume file: ${RESUME_FILE}"
    
    - name: Set up SSH agent
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.DEPLOY_KEY }}
        
    - name: Add GitHub to known hosts
      run: |
        mkdir -p ~/.ssh
        ssh-keyscan github.com >> ~/.ssh/known_hosts
    
    - name: Checkout storage repository
      uses: actions/checkout@v3
      with:
        repository: pewriebontal/storage
        path: storage-repo
        ssh-key: ${{ secrets.DEPLOY_KEY }}
        
    - name: Create directories if needed
      run: |
        mkdir -p storage-repo/public/pdfs
        
    - name: Copy resume to storage repository
      run: |
        cp ${{ env.RESUME_FILE }} storage-repo/public/pdfs/
        
    - name: Commit and push changes
      run: |
        cd storage-repo
        git config user.name "GitHub Actions Bot"
        git config user.email "actions@github.com"
        git add public/pdfs/${{ env.RESUME_FILE }}
        git commit -m "Update resume to latest version [ci skip]" || echo "No changes to commit"
        git push
